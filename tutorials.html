<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlaeAI — Tutorials</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* GLOBAL THEME */
        :root {
            --bg-light: #f5efe6;
            --bg-light-accent: #fff9f0;
            --text-light: #1a1a1a;
            --card-light: #ffffff;
            --border-light: #e0d4c2;

            --bg-dark: #0b0c10;
            --bg-dark-accent: #151821;
            --text-dark: #f5f5f5;
            --card-dark: #181b24;
            --border-dark: #2b3140;

            --primary: #c58b3b;
            --primary-soft: rgba(197,139,59,0.12);

            --radius-lg: 18px;
            --radius-md: 12px;
            --shadow-soft: 0 18px 45px rgba(0,0,0,0.12);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            transition: background 0.4s ease, color 0.4s ease;
        }

        body.dark-mode {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        /* NAVIGATION */
        nav {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 7%;
            backdrop-filter: blur(18px);
            background: rgba(253,247,238,0.85);
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        body.dark-mode nav {
            background: rgba(10,12,18,0.88);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        nav h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 700;
        }

        nav a {
            margin-left: 22px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            color: inherit;
            position: relative;
        }

        nav a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.2s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        #theme-toggle {
            padding: 8px 16px;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.08);
            background: rgba(255,255,255,0.9);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        body.dark-mode #theme-toggle {
            background: rgba(15,17,25,0.95);
            border-color: rgba(255,255,255,0.12);
            color: var(--text-dark);
        }

        /* HEADER LOGO */
        header {
            text-align: center;
            padding: 30px;
        }

        .logo-animate {
            max-width: 350px;
            border-radius: 12px;
            opacity: 0;
            transform: translateY(-10px);
            animation: fadeInLogo 1.2s ease forwards;
            filter: drop-shadow(0 0 18px rgba(197,139,59,0.45));
        }

        @keyframes fadeInLogo {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* TUTORIALS PAGE */
        h1 {
            text-align: center;
            font-family: 'Poppins', sans-serif;
            margin-top: 40px;
        }

        .subtitle {
            text-align: center;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .tutorials-container {
            max-width: 1100px;
            margin: auto;
            padding: 0 7%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
        }

        .card {
            background: var(--card-light);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 18px;
            box-shadow: 0 10px 26px rgba(0,0,0,0.06);
        }

        body.dark-mode .card {
            background: var(--card-dark);
            border-color: var(--border-dark);
        }

        .card h3 {
            margin: 0 0 6px;
            font-size: 16px;
            font-weight: 600;
        }

        .card p {
            margin: 0;
            font-size: 14px;
            opacity: 0.85;
        }

        .open-btn {
            margin-top: 10px;
            display: inline-block;
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        /* SIDE PANEL */
        #modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
        }

        #side-panel {
            position: fixed;
            top: 0;
            right: -500px;
            width: 400px;
            height: 100%;
            background: var(--card-light);
            border-left: 1px solid var(--border-light);
            padding: 20px;
            transition: 0.3s ease;
            overflow-y: auto;
        }

        body.dark-mode #side-panel {
            background: var(--card-dark);
            border-color: var(--border-dark);
        }

        .panel-buttons {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .panel-btn {
            padding: 8px 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    <img src="assets/logo.png" class="logo-animate" alt="AlaeAI — Build. Learn. Create.">
</header>

<nav>
    <h1>AlaeAI</h1>
    <div>
        <a href="index.html">Home</a>
        <a href="news.html">News</a>
        <a href="tutorials.html">Tutorials</a>
        <a href="tools.html">Tools</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
    </div>
    <button id="theme-toggle">🌙 Dark Mode</button>
</nav>

<h1>Step-by-Step Tutorials (20 Levels)</h1>
<p class="subtitle">Click the <strong>Open</strong> button on any tutorial to view it in the side panel.</p>

<div class="tutorials-container" id="tutorials-grid"></div>

<div id="modal-bg" onclick="closePanel()"></div>

<div id="side-panel">
    <div class="panel-buttons">
        <button class="panel-btn" onclick="toggleFullscreen()">Full Screen</button>
        <button class="panel-btn" onclick="closePanel()">Close</button>
    </div>
    <div id="tutorial-content"></div>
</div>

<script>
/* DARK MODE */
const THEME_KEY = "alaeai-theme";

function applyTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === "dark") {
        document.body.classList.add("dark-mode");
        document.getElementById("theme-toggle").textContent = "☀️ Light Mode";
    } else {
        document.body.classList.remove("dark-mode");
        document.getElementById("theme-toggle").textContent = "🌙 Dark Mode";
    }
}

applyTheme();

document.getElementById("theme-toggle").addEventListener("click", () => {
    const isDark = document.body.classList.toggle("dark-mode");
    localStorage.setItem(THEME_KEY, isDark ? "dark" : "light");
    applyTheme();
});

/* TUTORIALS DATA */
const tutorials = [
    { title: "HTML Basics", level: "Beginner", desc: "Learn how to structure a webpage.", file: "tutorials/html-basics.html" },
    { title: "CSS Basics", level: "Beginner", desc: "Learn styling and layout.", file: "tutorials/css-basics.html" },
    { title: "JavaScript Basics", level: "Beginner", desc: "Learn variables and functions.", file: "tutorials/js-basics.html" },
];

/* RENDER CARDS */
const grid = document.getElementById("tutorials-grid");
tutorials.forEach(t => {
    grid.innerHTML += `
        <div class="card">
            <h3>${t.title}</h3>
            <p>Difficulty: ${t.level}</p>
            <p>${t.desc}</p>
            <a class="open-btn" onclick="openPanel('${t.file}')">Open</a>
        </div>
    `;
});

/* PANEL FUNCTIONS */
function openPanel(file) {
    document.getElementById("modal-bg").style.display = "block";
    document.getElementById("side-panel").style.right = "0";
    fetch(file).then(res => res.text()).then(html => {
        document.getElementById("tutorial-content").innerHTML = html;
    });
}

function closePanel() {
    document.getElementById("modal-bg").style.display = "none";
    document.getElementById("side-panel").style.right = "-500px";
}

function toggleFullscreen() {
    const panel = document.getElementById("side-panel");
    panel.style.width = panel.style.width === "100%" ? "400px" : "100%";
}
</script>

</body>
</html>

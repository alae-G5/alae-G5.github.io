<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlaeAI — Tech & AI News</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
    :root {
        --bg-light: #f5efe6;
        --bg-light-accent: #fff9f0;
        --text-light: #1a1a1a;
        --card-light: #ffffff;
        --border-light: #e0d4c2;

        --bg-dark: #0b0c10;
        --bg-dark-accent: #151821;
        --text-dark: #f5f5f5;
        --card-dark: #181b24;
        --border-dark: #2b3140;

        --primary: #c58b3b;
        --primary-soft: rgba(197,139,59,0.12);

        --radius-lg: 18px;
        --radius-md: 12px;
        --shadow-soft: 0 18px 45px rgba(0,0,0,0.12);
    }

    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: var(--bg-light);
        color: var(--text-light);
        transition: background 0.4s ease, color 0.4s ease;
    }

    body.dark-mode {
        background: var(--bg-dark);
        color: var(--text-dark);
    }

    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
            linear-gradient(135deg, rgba(255,255,255,0.8), rgba(245,239,230,0.9)),
            radial-gradient(circle at 0% 0%, rgba(197,139,59,0.18), transparent 55%),
            radial-gradient(circle at 100% 100%, rgba(0,0,0,0.06), transparent 55%);
        z-index: -2;
    }

    body.dark-mode::before {
        background:
            radial-gradient(circle at 0% 0%, rgba(197,139,59,0.22), transparent 55%),
            radial-gradient(circle at 100% 100%, rgba(80,90,140,0.35), transparent 60%),
            linear-gradient(145deg, #05060a, #10131c);
    }

    nav {
        position: sticky;
        top: 0;
        z-index: 50;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 7%;
        backdrop-filter: blur(18px);
        background: rgba(253,247,238,0.85);
        border-bottom: 1px solid rgba(0,0,0,0.04);
    }

    body.dark-mode nav {
        background: rgba(10,12,18,0.88);
        border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    nav h1 {
        font-family: 'Poppins', sans-serif;
        font-size: 24px;
        font-weight: 700;
    }

    nav a {
        margin-left: 22px;
        text-decoration: none;
        font-weight: 500;
        font-size: 14px;
        color: inherit;
        position: relative;
    }

    nav a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -4px;
        width: 0;
        height: 2px;
        background: var(--primary);
        transition: width 0.2s ease;
    }

    nav a:hover::after {
        width: 100%;
    }

    #theme-toggle {
        padding: 8px 16px;
        border-radius: 999px;
        border: 1px solid rgba(0,0,0,0.08);
        background: rgba(255,255,255,0.9);
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
    }

    body.dark-mode #theme-toggle {
        background: rgba(15,17,25,0.95);
        border-color: rgba(255,255,255,0.12);
        color: var(--text-dark);
    }

    .page {
        max-width: 1100px;
        margin: 40px auto;
        padding: 0 7%;
    }

    h2 {
        font-family: 'Poppins', sans-serif;
        font-size: 26px;
        margin-bottom: 20px;
    }

    .news-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 20px;
    }

    .news-card {
        background: var(--card-light);
        border: 1px solid var(--border-light);
        border-radius: var(--radius-md);
        padding: 18px;
        box-shadow: 0 10px 26px rgba(0,0,0,0.06);
    }

    body.dark-mode .news-card {
        background: var(--card-dark);
        border-color: var(--border-dark);
        box-shadow: 0 14px 32px rgba(0,0,0,0.55);
    }

    .news-card h3 {
        margin: 0 0 8px;
        font-size: 17px;
        font-weight: 600;
    }

    .news-card p {
        margin: 0 0 12px;
        font-size: 14px;
        opacity: 0.85;
    }

    .news-card a {
        font-size: 14px;
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
    }

    footer {
        margin-top: 60px;
        padding: 30px 7%;
        text-align: center;
        font-size: 13px;
        background: rgba(253,247,238,0.9);
        border-top: 1px solid rgba(0,0,0,0.06);
    }

    body.dark-mode footer {
        background: rgba(8,10,16,0.95);
        border-top-color: rgba(255,255,255,0.08);
    }
    </style>
</head>

<body>

<nav>
    <h1>AlaeAI</h1>
    <div>
        <a href="index.html">Home</a>
        <a href="news.html">News</a>
        <a href="tutorials.html">Tutorials</a>
        <a href="tools.html">Tools</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
    </div>
    <button id="theme-toggle">🌙 Dark Mode</button>
</nav>

<div class="page">
    <h2>Latest Tech & AI News</h2>
    <div id="news-container" class="news-grid">
        <p>Loading real news...</p>
    </div>
</div>

<footer>
    © 2026 AlaeAI — All Rights Reserved
</footer>

<script>
/* GLOBAL THEME SYSTEM */
const THEME_KEY = "alaeai-theme";

function applyTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === "dark") {
        document.body.classList.add("dark-mode");
        document.getElementById("theme-toggle").textContent = "☀️ Light Mode";
    } else {
        document.body.classList.remove("dark-mode");
        document.getElementById("theme-toggle").textContent = "🌙 Dark Mode";
    }
}

applyTheme();

document.getElementById("theme-toggle").addEventListener("click", () => {
    const isDark = document.body.classList.toggle("dark-mode");
    localStorage.setItem(THEME_KEY, isDark ? "dark" : "light");
    applyTheme();
});

/* REAL NEWS FETCHER — Unlimited Live News */
async function loadNews() {
    const container = document.getElementById("news-container");
    container.innerHTML = "<p>Loading...</p>";

    try {
        const rssUrl = "https://gnews.io/api/v4/top-headlines?category=technology&lang=en&country=us&apikey=demo";
        const response = await fetch(rssUrl);
        const data = await response.json();

        container.innerHTML = "";

        data.articles.forEach(article => {
            const card = document.createElement("div");
            card.className = "news-card";

            card.innerHTML = `
                <h3>${article.title}</h3>
                <p>${article.description || "No description available."}</p>
                <a href="${article.url}" target="_blank">Read more →</a>
            `;

            container.appendChild(card);
        });

    } catch (error) {
        container.innerHTML = "<p>Failed to load news.</p>";
    }
}

loadNews();
</script>

</body>
</html>

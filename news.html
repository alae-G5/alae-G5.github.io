<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlaeAI — Tech & AI News</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg-light: #f5efe6;
    --bg-light-accent: #fff9f0;
    --text-light: #1a1a1a;
    --card-light: #ffffff;
    --border-light: #e0d4c2;

    --bg-dark: #05060a;
    --bg-dark-accent: #10131c;
    --text-dark: #f5f5f5;
    --card-dark: #151821;
    --border-dark: #2b3140;

    --primary: #c58b3b;
    --primary-soft: rgba(197,139,59,0.12);

    --radius-lg: 18px;
    --radius-md: 12px;
    --shadow-soft: 0 18px 45px rgba(0,0,0,0.12);
}

/* GLOBAL */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg-light);
    color: var(--text-light);
    transition: background 0.4s ease, color 0.4s ease;
}

body.dark-mode {
    background: var(--bg-dark);
    color: var(--text-dark);
}

/* Background */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        linear-gradient(135deg, rgba(255,255,255,0.9), rgba(245,239,230,0.95)),
        radial-gradient(circle at 0% 0%, rgba(197,139,59,0.18), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(0,0,0,0.06), transparent 55%);
    z-index: -2;
}

body.dark-mode::before {
    background:
        radial-gradient(circle at 0% 0%, rgba(197,139,59,0.22), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(80,90,140,0.35), transparent 60%),
        linear-gradient(145deg, #05060a, #10131c);
}

/* NAVBAR */
nav {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 7%;
    backdrop-filter: blur(18px);
    background: rgba(253,247,238,0.9);
    border-bottom: 1px solid rgba(0,0,0,0.04);
}

body.dark-mode nav {
    background: rgba(10,12,18,0.9);
    border-bottom: 1px solid rgba(255,255,255,0.06);
}

nav h1 {
    font-family: 'Poppins', sans-serif;
    font-size: 24px;
    font-weight: 700;
}

nav a {
    margin-left: 22px;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    color: inherit;
    position: relative;
}

nav a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -4px;
    width: 0;
    height: 2px;
    background: var(--primary);
    transition: width 0.2s ease;
}

nav a:hover::after {
    width: 100%;
}

#theme-toggle {
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid rgba(0,0,0,0.08);
    background: rgba(255,255,255,0.9);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
}

body.dark-mode #theme-toggle {
    background: rgba(15,17,25,0.95);
    border-color: rgba(255,255,255,0.12);
    color: var(--text-dark);
}

/* PAGE */
.page {
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 7%;
}

h2 {
    font-family: 'Poppins', sans-serif;
    font-size: 28px;
    margin-bottom: 25px;
}

/* TOP BAR */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

/* CATEGORY TABS */
.category-tabs {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
}

.category-tab {
    padding: 8px 16px;
    border-radius: 999px;
    background: var(--primary-soft);
    color: var(--primary);
    font-weight: 600;
    cursor: pointer;
    transition: 0.25s ease;
    border: 1px solid transparent;
    font-size: 13px;
}

.category-tab.active {
    background: var(--primary);
    color: white;
}

.category-tab:hover {
    transform: translateY(-3px);
}

/* REFRESH BUTTON */
#refresh-btn {
    padding: 8px 18px;
    border-radius: 999px;
    border: none;
    background: var(--primary);
    color: white;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    transition: 0.2s ease;
}

#refresh-btn:hover {
    transform: translateY(-2px);
    opacity: 0.95;
}

/* TRENDING */
.trending-box {
    background: var(--card-light);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 22px;
    margin-bottom: 35px;
    box-shadow: var(--shadow-soft);
    animation: fadeIn 0.6s ease;
}

body.dark-mode .trending-box {
    background: var(--card-dark);
    border-color: var(--border-dark);
}

.trending-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
}

.trending-box h3 {
    margin: 0;
    font-size: 20px;
    font-family: 'Poppins', sans-serif;
}

.trending-sub {
    font-size: 12px;
    opacity: 0.7;
}

.trending-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
}

.trending-card {
    display: flex;
    gap: 10px;
    padding: 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(0,0,0,0.04);
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
}

body.dark-mode .trending-card {
    background: rgba(18,20,30,0.95);
    border-color: rgba(255,255,255,0.06);
}

.trending-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(0,0,0,0.18);
}

.trending-thumb {
    flex: 0 0 60px;
    height: 60px;
    border-radius: 10px;
    overflow: hidden;
    background: radial-gradient(circle at 0% 0%, rgba(197,139,59,0.25), transparent 60%),
                radial-gradient(circle at 100% 100%, rgba(0,0,0,0.08), transparent 60%);
}

body.dark-mode .trending-thumb {
    background: radial-gradient(circle at 0% 0%, rgba(197,139,59,0.35), transparent 60%),
                radial-gradient(circle at 100% 100%, rgba(40,50,90,0.6), transparent 60%);
}

.trending-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.trending-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.trending-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
}

.trending-meta {
    font-size: 11px;
    opacity: 0.7;
}

/* NEWS GRID */
.news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
}

.news-card {
    background: var(--card-light);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-md);
    overflow: hidden;
    box-shadow: 0 10px 26px rgba(0,0,0,0.06);
    animation: fadeUp 0.5s ease;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.news-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 32px rgba(0,0,0,0.16);
}

body.dark-mode .news-card {
    background: var(--card-dark);
    border-color: var(--border-dark);
    box-shadow: 0 14px 32px rgba(0,0,0,0.55);
}

.news-image {
    width: 100%;
    height: 190px;
    overflow: hidden;
    position: relative;
}

.news-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Fallback gradient image */
.news-image.fallback {
    background:
        radial-gradient(circle at 0% 0%, rgba(197,139,59,0.35), transparent 60%),
        radial-gradient(circle at 100% 100%, rgba(0,0,0,0.08), transparent 60%),
        linear-gradient(135deg, #f8f1e4, #f0e2cf);
}

body.dark-mode .news-image.fallback {
    background:
        radial-gradient(circle at 0% 0%, rgba(197,139,59,0.45), transparent 60%),
        radial-gradient(circle at 100% 100%, rgba(40,50,90,0.7), transparent 60%),
        linear-gradient(135deg, #05060a, #151821);
}

.news-card-content {
    padding: 18px;
}

.news-card h3 {
    margin: 0 0 10px;
    font-size: 18px;
    font-weight: 600;
}

.news-card p {
    margin: 0 0 14px;
    font-size: 14px;
    opacity: 0.85;
}

.news-meta {
    font-size: 11px;
    opacity: 0.7;
    margin-bottom: 8px;
}

.news-card a {
    font-size: 14px;
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
}

/* STATUS */
#status-text {
    text-align: center;
    margin: 20px 0 0;
    font-size: 13px;
    opacity: 0.8;
}

/* ANIMATIONS */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* FOOTER */
footer {
    margin-top: 60px;
    padding: 30px 7%;
    text-align: center;
    font-size: 13px;
    background: rgba(253,247,238,0.9);
    border-top: 1px solid rgba(0,0,0,0.06);
}

body.dark-mode footer {
    background: rgba(8,10,16,0.95);
    border-top-color: rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<nav>
    <h1>AlaeAI</h1>
    <div>
        <a href="index.html">Home</a>
        <a href="news.html">News</a>
        <a href="tutorials.html">Tutorials</a>
        <a href="tools.html">Tools</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
    </div>
    <button id="theme-toggle">🌙 Dark Mode</button>
</nav>

<div class="page">

    <h2>Latest Tech & AI News</h2>

    <div class="top-bar">
        <div class="category-tabs">
            <div class="category-tab active" data-category="all">All</div>
            <div class="category-tab" data-category="ai">AI</div>
            <div class="category-tab" data-category="tech">Tech</div>
            <div class="category-tab" data-category="space">Space</div>
            <div class="category-tab" data-category="science">Science</div>
            <div class="category-tab" data-category="programming">Programming</div>
        </div>

        <button id="refresh-btn">⟳ Refresh</button>
    </div>

    <!-- TRENDING -->
    <div class="trending-box" id="trending-box">
        <div class="trending-header">
            <h3>🔥 Trending</h3>
            <div class="trending-sub" id="trending-sub">Curated from top tech sources</div>
        </div>
        <div id="trending-list" class="trending-grid"></div>
    </div>

    <!-- NEWS GRID -->
    <div id="news-container" class="news-grid">
        <p>Loading real news...</p>
    </div>

    <p id="status-text"></p>
</div>

<footer>
    © 2026 AlaeAI — All Rights Reserved
</footer>

<script>
/* THEME */
const THEME_KEY = "alaeai-theme";

function applyTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === "dark") {
        document.body.classList.add("dark-mode");
        document.getElementById("theme-toggle").textContent = "☀️ Light Mode";
    } else {
        document.body.classList.remove("dark-mode");
        document.getElementById("theme-toggle").textContent = "🌙 Dark Mode";
    }
}

applyTheme();

document.getElementById("theme-toggle").addEventListener("click", () => {
    const isDark = document.body.classList.toggle("dark-mode");
    localStorage.setItem(THEME_KEY, isDark ? "dark" : "light");
    applyTheme();
});

/* NEWS SYSTEM */
let allArticles = [];
let currentCategory = "all";
let renderedCount = 0;
const CHUNK_SIZE = 9;
let isLoadingMore = false;

const RSS_SOURCES = [
    "https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml",
    "https://techcrunch.com/feed/",
    "https://www.theverge.com/rss/index.xml",
    "https://www.wired.com/feed/rss",
    "https://www.technologyreview.com/feed/",
    "https://feeds.arstechnica.com/arstechnica/technology-lab",
    "https://www.nasa.gov/rss/dyn/breaking_news.rss"
];

function getHostFromUrl(url) {
    try {
        return new URL(url).hostname || "";
    } catch {
        return "";
    }
}

function detectCategory(text, sourceUrl) {
    const t = (text || "").toLowerCase();
    const host = getHostFromUrl(sourceUrl);

    if (t.includes("ai") || t.includes("artificial intelligence") || t.includes("machine learning") || t.includes("neural") || t.includes("openai") || t.includes("chatgpt") || t.includes("model")) {
        return "ai";
    }
    if (t.includes("space") || t.includes("nasa") || t.includes("orbit") || t.includes("rocket") || t.includes("spacex") || t.includes("astronomy")) {
        return "space";
    }
    if (t.includes("research") || t.includes("study") || t.includes("biology") || t.includes("physics") || t.includes("chemistry") || t.includes("scientist")) {
        return "science";
    }
    if (t.includes("developer") || t.includes("programming") || t.includes("code") || t.includes("software") || t.includes("github") || t.includes("javascript") || t.includes("python")) {
        return "programming";
    }

    if (host.includes("techcrunch")) return "tech";
    if (host.includes("theverge")) return "tech";
    if (host.includes("wired")) return "science";
    if (host.includes("technologyreview")) return "science";
    if (host.includes("arstechnica")) return "tech";
    if (host.includes("nasa")) return "space";
    if (host.includes("nytimes")) return "tech";

    return "tech";
}

function buildImageUrl(category) {
    const base = "https://source.unsplash.com/1200x800/?";
    switch (category) {
        case "ai":
            return base + "ai,artificial-intelligence,futuristic,technology";
        case "space":
            return base + "space,galaxy,astronomy,stars";
        case "science":
            return base + "science,laboratory,research";
        case "programming":
            return base + "programming,code,developer,computer";
        case "tech":
        default:
            return base + "technology,gadgets,innovation";
    }
}

function extractImageFromItem(item) {
    const media = item.querySelector("media\\:content, content, media\\:thumbnail");
    if (media && media.getAttribute("url")) {
        return media.getAttribute("url");
    }
    const enclosure = item.querySelector("enclosure");
    if (enclosure && enclosure.getAttribute("url")) {
        return enclosure.getAttribute("url");
    }
    const contentEncoded = item.getElementsByTagName("content:encoded")[0];
    if (contentEncoded && contentEncoded.textContent) {
        const html = contentEncoded.textContent;
        const match = html.match(/<img[^>]+src=["']([^"']+)["']/i);
        if (match && match[1]) return match[1];
    }
    return null;
}

async function loadNews() {
    const container = document.getElementById("news-container");
    const trendingList = document.getElementById("trending-list");
    const statusText = document.getElementById("status-text");

    container.innerHTML = "<p>Loading...</p>";
    trendingList.innerHTML = "";
    statusText.textContent = "";

    allArticles = [];
    renderedCount = 0;

    for (const url of RSS_SOURCES) {
        try {
            const response = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`);
            const text = await response.text();

            const parser = new DOMParser();
            const xml = parser.parseFromString(text, "text/xml");
            const items = xml.querySelectorAll("item");

            items.forEach(item => {
                const title = item.querySelector("title")?.textContent?.trim() || "No title";
                const description = item.querySelector("description")?.textContent?.trim() || "No description";
                const link = item.querySelector("link")?.textContent?.trim() || "#";

                const combined = title + " " + description;
                const category = detectCategory(combined, url);

                let image = extractImageFromItem(item);
                const hasRealImage = !!image;
                if (!image) {
                    image = buildImageUrl(category);
                }

                allArticles.push({
                    title,
                    description,
                    link,
                    category,
                    image,
                    hasRealImage,
                    source: url
                });
            });
        } catch (err) {
            // ignore single source failure
        }
    }

    if (allArticles.length === 0) {
        container.innerHTML = "<p>Failed to load news.</p>";
        return;
    }

    allArticles = allArticles.slice(0, 150);

    const trending = allArticles.slice(0, 8);
    trending.forEach(a => {
        const card = document.createElement("div");
        card.className = "trending-card";
        card.onclick = () => window.open(a.link, "_blank");

        const thumb = document.createElement("div");
        thumb.className = "trending-thumb";

        if (a.hasRealImage) {
            const img = document.createElement("img");
            img.src = a.image;
            img.alt = "Trending";
            thumb.appendChild(img);
        }

        const info = document.createElement("div");
        info.className = "trending-info";

        const titleEl = document.createElement("div");
        titleEl.className = "trending-title";
        titleEl.textContent = a.title;

        const metaEl = document.createElement("div");
        metaEl.className = "trending-meta";
        metaEl.textContent = a.category.toUpperCase();

        info.appendChild(titleEl);
        info.appendChild(metaEl);

        card.appendChild(thumb);
        card.appendChild(info);

        trendingList.appendChild(card);
    });

    container.innerHTML = "";
    renderMoreArticles();
}

function getFilteredArticles() {
    if (currentCategory === "all") return allArticles;
    const filtered = allArticles.filter(a => a.category === currentCategory);
    if (filtered.length === 0) {
        return allArticles.slice(0, 30);
    }
    return filtered;
}

function renderMoreArticles() {
    const container = document.getElementById("news-container");
    const statusText = document.getElementById("status-text");

    const filtered = getFilteredArticles();

    if (renderedCount === 0) container.innerHTML = "";

    const nextSlice = filtered.slice(renderedCount, renderedCount + CHUNK_SIZE);

    nextSlice.forEach(a => {
        const card = document.createElement("div");
        card.className = "news-card";
        card.setAttribute("data-category", a.category);

        const imageWrapper = document.createElement("div");
        imageWrapper.className = "news-image";
        if (!a.hasRealImage) {
            imageWrapper.classList.add("fallback");
        }

        if (a.image && a.hasRealImage) {
            const img = document.createElement("img");
            img.src = a.image;
            img.alt = "News Image";
            imageWrapper.appendChild(img);
        } else if (a.image && !a.hasRealImage) {
            const img = document.createElement("img");
            img.src = a.image;
            img.alt = "News Image";
            imageWrapper.appendChild(img);
        }

        const content = document.createElement("div");
        content.className = "news-card-content";

        const meta = document.createElement("div");
        meta.className = "news-meta";
        meta.textContent = a.category.toUpperCase();

        const titleEl = document.createElement("h3");
        titleEl.textContent = a.title;

        const descEl = document.createElement("p");
        descEl.textContent = a.description;

        const linkEl = document.createElement("a");
        linkEl.href = a.link;
        linkEl.target = "_blank";
        linkEl.textContent = "Read more →";

        content.appendChild(meta);
        content.appendChild(titleEl);
        content.appendChild(descEl);
        content.appendChild(linkEl);

        card.appendChild(imageWrapper);
        card.appendChild(content);

        container.appendChild(card);
    });

    renderedCount += nextSlice.length;

    if (renderedCount >= filtered.length) {
        statusText.textContent = "You reached the end.";
    } else {
        statusText.textContent = "Scroll to load more…";
    }

    isLoadingMore = false;
}

/* CATEGORY FILTER */
document.querySelectorAll(".category-tab").forEach(tab => {
    tab.addEventListener("click", () => {
        document.querySelectorAll(".category-tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");

        currentCategory = tab.dataset.category;
        renderedCount = 0;
        document.getElementById("status-text").textContent = "";
        renderMoreArticles();
    });
});

/* INFINITE SCROLL */
window.addEventListener("scroll", () => {
    if (isLoadingMore) return;

    const scrollPosition = window.innerHeight + window.scrollY;
    const threshold = document.body.offsetHeight - 400;

    if (scrollPosition >= threshold) {
        isLoadingMore = true;
        renderMoreArticles();
    }
});

/* REFRESH BUTTON */
document.getElementById("refresh-btn").addEventListener("click", () => {
    loadNews();
});

/* INIT */
loadNews();
</script>

</body>
</html>
